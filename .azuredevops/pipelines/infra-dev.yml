trigger:
  branches:
    include:
      - main
  paths:
    include:
      - expense-infra/modules/*
      - expense-infra/modules/**
      - expense-infra/envs/dev/*
      - expense-infra/envs/dev/**
      - .azuredevops/pipelines/infra-dev.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - expense-infra/modules/*
      - expense-infra/modules/**
      - expense-infra/envs/dev/*
      - expense-infra/envs/dev/**
      - .azuredevops/pipelines/infra-dev.yml

variables:
  - name: azureServiceConnection
    value: sc-expenseflow-azure

pool:
  name: Default
  demands:
    - Agent.Name -equals devops-self-hosted-agent

stages:
  - stage: PlanDev
    displayName: Plan dev infrastructure
    variables:
      - group: expenseflow-dev
    jobs:
      - job: PlanDev
        steps:
          - checkout: self
            fetchDepth: 0

          - task: AzureCLI@2
            displayName: Terraform dev plan
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(Build.SourcesDirectory)/expense-infra/envs/dev
              inlineScript: |
                set -euo pipefail

                terraform version

                cat > pipeline.auto.tfvars <<EOF
                subscription_id = "$(subscription_id)"
                tenant_id = "$(tenant_id)"
                key_vault_admin_object_ids = ["$(key_vault_admin_object_id)"]
                postgres_admin_password = "$(postgres_admin_password)"
                EOF

                terraform init -backend-config=backend.hcl -upgrade
                terraform validate
                terraform plan -out=tfplan

          - publish: $(Build.SourcesDirectory)/expense-infra/envs/dev/tfplan
            artifact: dev-tfplan
            displayName: Publish dev tfplan

  - stage: ApplyDev
    displayName: Apply dev infrastructure
    dependsOn: PlanDev
    variables:
      - group: expenseflow-dev
    jobs:
      - deployment: ApplyDev
        displayName: Apply dev
        environment: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  fetchDepth: 0

                - download: current
                  artifact: dev-tfplan

                - task: AzureCLI@2
                  displayName: Terraform dev apply
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: $(Build.SourcesDirectory)/expense-infra/envs/dev
                    inlineScript: |
                      set -euo pipefail

                      terraform version

                      cat > pipeline.auto.tfvars <<EOF
                      subscription_id = "$(subscription_id)"
                      tenant_id = "$(tenant_id)"
                      key_vault_admin_object_ids = ["$(key_vault_admin_object_id)"]
                      postgres_admin_password = "$(postgres_admin_password)"
                      EOF

                      cp "$(Pipeline.Workspace)/dev-tfplan/tfplan" ./tfplan
                      terraform init -backend-config=backend.hcl -upgrade
                      terraform apply -auto-approve tfplan
