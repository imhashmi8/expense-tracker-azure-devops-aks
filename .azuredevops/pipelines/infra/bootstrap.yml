trigger:
  branches:
    include:
      - main
  paths:
    include:
      - expense-infra/bootstrap/*
      - expense-infra/bootstrap/**
      - .azuredevops/pipelines/infra/bootstrap.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - expense-infra/bootstrap/*
      - expense-infra/bootstrap/**
      - .azuredevops/pipelines/infra/bootstrap.yml

variables:
  - group: expenseflow-bootstrap
  - name: azureServiceConnection
    value: sc-expenseflow-azure

pool:
  name: Default
  demands:
    - Agent.Name -equals devops-self-hosted-agent

stages:
  - stage: Bootstrap
    displayName: Bootstrap Terraform remote state
    jobs:
      - deployment: BootstrapApply
        displayName: Apply bootstrap
        environment: bootstrap
        timeoutInMinutes: 15
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                  fetchDepth: 0

                - task: AzureCLI@2
                  displayName: Write pipeline tfvars
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: $(Build.SourcesDirectory)/expense-infra/bootstrap
                    inlineScript: |
                      set -euo pipefail
                      cat > pipeline.auto.tfvars <<EOF
                      subscription_id = "$(subscription_id)"
                      EOF

                - task: AzureCLI@2
                  displayName: Terraform init and validate
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: $(Build.SourcesDirectory)/expense-infra/bootstrap
                    inlineScript: |
                      set -euo pipefail
                      terraform version
                      terraform init -upgrade
                      terraform validate

                - task: AzureCLI@2
                  displayName: Terraform apply
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: $(Build.SourcesDirectory)/expense-infra/bootstrap
                    inlineScript: |
                      set -euo pipefail
                      terraform plan -out=tfplan
                      terraform apply -auto-approve tfplan
